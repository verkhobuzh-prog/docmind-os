[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 30
addopts =
    --tb=short
    --no-header
    -q
markers =
    slow: marks tests as slow
    integration: marks tests requiring external services or pipeline mocks
    unit: marks pure unit tests
    ai_quality: marks AI quality and prompt regression tests
    cost: marks cost tracking tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
